<!DOCTYPE html>
<script>
  let lastHeight = 0;
  
  function sendHeightToObsidian() {
      const height = document.documentElement.scrollHeight;
      if (height !== lastHeight) {
          parent.postMessage({ type: 'iframe-resize', height: height }, '*');
          lastHeight = height;
      }
  }
  
  // Отслеживаем изменения
  new ResizeObserver(sendHeightToObsidian).observe(document.body);
  window.addEventListener('load', sendHeightToObsidian);
  </script>
<html>
<head>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    #graph-container {
      width: 600px;
      height: 400px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>
  <script>
    const nodes = new vis.DataSet([
      { id: 1, label: "Алгоритм Дейкстры" },
      { id: 2, label: "BFS" },
      { id: 3, label: "DFS" }
    ]);
    const edges = new vis.DataSet([
      { from: 1, to: 2 },
      { from: 1, to: 3 }
    ]);
    const container = document.getElementById("graph-container");
    const data = { nodes, edges };
    const options = {};
    new vis.Network(container, data, options);
  </script>
</body>
</html>
